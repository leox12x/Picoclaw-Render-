services:
  - type: web
    name: picoclaw-bot
    runtime: docker
    repo: https://github.com/rahamanleon/Picoclaw-Render-.git
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: true


